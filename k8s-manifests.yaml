apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
---
apiVersion: v1
kind: Secret
metadata:
  name: billing-secret
type: Opaque
stringData:
  ConnectionStrings__BillingDb: "Host=billing-db;Database=billing;Username=postgres;Password=postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "billing"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: billing-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-db
spec:
  selector:
    matchLabels:
      app: billing-db
  template:
    metadata:
      labels:
        app: billing-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: billing-secret
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: billing-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: billing-db
spec:
  type: ClusterIP
  selector:
    app: billing-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: billing-service
        image: billing-service:latest
        imagePullPolicy: Never # Crucial for using local Docker images in Minikube
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: billing-config
        - secretRef:
            name: billing-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /openapi/v1.json
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /openapi/v1.json
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  type: NodePort
  selector:
    app: billing-service
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30050